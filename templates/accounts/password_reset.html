{% extends "accounts/auth_base.html" %}
{% block title %}Mot de passe oublié{% endblock %}
{% block card %}
<h1 class="text-xl font-bold text-slate-800">Mot de passe oublié</h1>
<p class="text-sm text-slate-500 mt-1 mb-5">Saisissez votre email : vous recevrez un lien de réinitialisation.</p>
<form method="post" class="space-y-4">{% csrf_token %}
  {% for f in form %}<div><label class="text-sm font-medium text-slate-700">{{ f.label }}</label>{{ f }}</div>{% endfor %}
  <button class="w-full lpm-gradient text-white font-semibold py-2.5 rounded-lg shadow">Envoyer le lien</button>
</form>
{% endblock %}
