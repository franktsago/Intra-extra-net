<table class="w-full text-sm">
  <thead class="bg-slate-50 text-slate-500 text-left"><tr>
    <th class="px-4 py-3">Employé</th><th class="px-4 py-3">Type</th><th class="px-4 py-3">Période</th><th class="px-4 py-3">Jours</th><th></th>
  </tr></thead>
  <tbody class="divide-y divide-slate-100">
    {% for r in rows %}
    <tr class="hover:bg-slate-50">
      <td class="px-4 py-3 font-medium text-slate-800">{{ r.employee.full_name }}</td>
      <td class="px-4 py-3 text-slate-500">{{ r.leave_type.name }}</td>
      <td class="px-4 py-3 text-slate-500">{{ r.start_date|date:"d/m" }} → {{ r.end_date|date:"d/m" }}</td>
      <td class="px-4 py-3">{{ r.days_count }}</td>
      <td class="px-4 py-3 text-right"><a href="{% url 'conges:decide' r.pk %}" class="lpm-gradient text-white px-3 py-1.5 rounded-lg text-xs font-medium">Traiter</a></td>
    </tr>
    {% empty %}<tr><td colspan="5" class="px-4 py-6 text-center text-slate-400">Rien à traiter.</td></tr>{% endfor %}
  </tbody>
</table>
