<a href="{% url url %}" class="bg-white rounded-2xl border border-slate-200 shadow-card p-5 flex flex-col items-center justify-center text-center gap-2 hover:shadow-md hover:-translate-y-0.5 transition">
  <span class="h-11 w-11 rounded-xl bg-{{ color }}-50 text-{{ color }}-600 flex items-center justify-center">
    <i class="fa-solid {{ icon }} text-lg"></i>
  </span>
  <span class="text-sm font-medium text-slate-700">{{ label }}</span>
</a>
