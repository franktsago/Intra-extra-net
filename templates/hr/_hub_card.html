<a href="{% url url %}" class="bg-white rounded-2xl border border-slate-200 shadow-card p-5 flex items-start gap-4 hover:shadow-md hover:-translate-y-0.5 transition">
  <span class="h-12 w-12 rounded-xl bg-{{ color }}-50 text-{{ color }}-600 flex items-center justify-center flex-shrink-0"><i class="fa-solid {{ icon }} text-lg"></i></span>
  <div><div class="font-bold text-slate-800">{{ title }}</div><div class="text-sm text-slate-500">{{ desc }}</div></div>
</a>
