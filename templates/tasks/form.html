{% extends "base.html" %}
{% block title %}Nouvelle tâche{% endblock %}
{% block page_title %}Nouvelle tâche{% endblock %}
{% block content %}
<div class="max-w-2xl bg-white rounded-xl shadow-card p-6">
  <form method="post">{% csrf_token %}
    {% include "includes/form.html" %}
    <div class="mt-6 flex gap-3">
      <button class="lpm-gradient text-white font-semibold px-5 py-2.5 rounded-lg shadow">Créer</button>
      <a href="{% url 'tasks:board' %}" class="px-5 py-2.5 rounded-lg border border-slate-300 text-slate-600">Annuler</a>
    </div>
  </form>
</div>
<script>
  // Met à jour l'intitulé du menu déroulant avec le nombre de membres cochés.
  document.querySelectorAll('details.cb-dd').forEach(function(dd){
    var label = dd.querySelector('[data-cbdd-label]');
    function refresh(){
      var n = dd.querySelectorAll('input[type=checkbox]:checked').length;
      label.textContent = n === 0 ? 'Sélectionner les membres…'
        : (n === 1 ? '1 membre sélectionné' : n + ' membres sélectionnés');
    }
    dd.addEventListener('change', refresh);
    refresh();
  });
</script>
{% endblock %}
